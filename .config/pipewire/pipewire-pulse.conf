# PulseAudio config file for PipeWire version "1.4.9" #

context.properties = { default.clock.quantum-limit = 8192 }

context.spa-libs = {
    audio.convert.* = audioconvert/libspa-audioconvert
    support.*       = support/libspa-support
}

context.modules = [
    { name = libpipewire-module-rt args = { nice.level   = -11 } flags = [ ifexists nofail ] }
    { name = libpipewire-module-protocol-native }
    { name = libpipewire-module-client-node }
    { name = libpipewire-module-adapter }
    { name = libpipewire-module-metadata }
    { name = libpipewire-module-protocol-pulse args = { } }
]

context.exec = [ ]

pulse.cmd = [
    { cmd = "load-module" args = "module-always-sink" }
    { cmd = "load-module" args = "module-device-manager" }
    { cmd = "load-module" args = "module-device-restore" }
    { cmd = "load-module" args = "module-stream-restore" }
    #{ cmd = "load-module" args = "module-switch-on-connect" }
]

stream.properties = {
    resample.quality      = 14
    channelmix.normalize  = true
    channelmix.upmix      = true
    channelmix.upmix-method = psd  # none, simple
    dither.method = wannamaker3  # none, shaped5, wannamaker3, triangular-hf
}

pulse.properties = {
    server.address = [ "unix:native" ]
    pulse.min.req          = 256/48000     # 2.7ms
    pulse.default.tlength  = 96000/48000   # 2 seconds
    pulse.min.quantum      = 256/48000     # 2.7ms
    pulse.default.format   = F32
}

# client/stream specific properties
pulse.rules = [
    {
        matches = [ { application.process.binary = "vivaldi" } ]
        actions = { quirks = [ remove-capture-dont-move ] }
    }
    {
        matches = [ { application.name = "~speech-dispatcher.*" } ]
        actions = {
            update-props = {
                pulse.min.req          = 512/48000      # 10.6ms
                pulse.min.quantum      = 512/48000      # 10.6ms
            }
        }
    }
]
