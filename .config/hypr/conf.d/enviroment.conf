#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

# --- Aquamarine (Multi-GPU / Backend) ---
# Prioritize dGPU over iGPU for the new Aquamarine backend
env = AQ_DRM_DEVICES,/dev/dri/card1:/dev/dri/card0

# --- Explicit Sync & Performance ---
# Enable explicit sync support for AMD/RADV and ensure atomic mode is active
env = RADV_PERFTEST,ext_sync
env = AQ_NO_ATOMIC,0

# --- Graphics & Hardware Acceleration ---
# VA-API/VDPAU drivers for AMD; force Vulkan for ANGLE-based apps (Chrome/Electron)
env = LIBVA_DRIVER_NAME,radeonsi
env = VDPAU_DRIVER,radeonsi
env = ANGLE_DEFAULT_PLATFORM,vulkan
env = RADV_DEBUG,noconformcheck

# --- Cursor (Hyprcursor 0.1.13+ standard) ---
# Modern Hyprcursor configuration for high-DPI and smooth rendering
env = HYPRCURSOR_THEME,Nordzy-hyprcursors
env = HYPRCURSOR_SIZE,26
# Fallback for legacy X11 apps
env = XCURSOR_SIZE,26

# --- Toolkit Backends ---
# Prefer Wayland but allow fallback to X11 for legacy compatibility
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

# --- IME (Fcitx5 / 2026 Recommended) ---
# Modern IME integration for Wayland-native and GTK/QT applications
env = XMODIFIERS,@im=fcitx
env = QT_IM_MODULE,fcitx
# Use the optimized GTK module for Hyprland environments
env = GTK_IM_MODULE,fcitxhyprland

