#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = dbus-update-activation-environment --all
exec-once = sleep 1 && dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

exec-once = sleep 1.5 && fcitx5 -d --replace

exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

exec-once = dunst
exec-once = hypridle
exec-once = hyprctl setcursor "Hakurei Reimu-hyprcursor" 24
exec-once = gsr-ui

exec-once = ~/.config/hypr/scripts/wallpaper_start.sh
exec-once = ~/.config/eww/launch_bar.sh
exec-once = ~/.config/hypr/scripts/dns-warmup.sh
